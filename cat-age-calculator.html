<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cat Age Calculator</title>

<style>
body{
    font-family:Arial,sans-serif;
    max-width:800px;
    margin:auto;
    padding:20px;
    line-height:1.6;
}

input,button{
    padding:10px;
    font-size:16px;
}

.result{
    margin-top:20px;
    font-size:24px;
    font-weight:bold;
}

a{
    text-decoration:none;
}
</style>
</head>

<body>

<a href="index.html">← Home</a>

<h1>Cat Age Calculator</h1>

<p>
Estimate your cat's age in human years.
</p>

<input type="number" id="catAge" min="0" step="0.1" placeholder="Enter cat age">

<button onclick="calculateAge()">Calculate</button>

<div class="result" id="result"></div>

<h2>How Cat Age Is Calculated</h2>

<p>
Cats age quickly during their first two years and then age more slowly.
This calculator provides a simple estimate.
</p>

<script>
function calculateAge(){

let age = parseFloat(document.getElementById("catAge").value);

if(isNaN(age) || age < 0){
    document.getElementById("result").innerHTML =
    "Please enter a valid age.";
    return;
}

let humanAge;

if(age <= 1){
    humanAge = 15;
}
else if(age <= 2){
    humanAge = 24;
}
else{
    humanAge = 24 + ((age - 2) * 4);
}

document.getElementById("result").innerHTML =
"Estimated Human Age: " + humanAge.toFixed(1) + " years";
}
</script>

</body>
</html>
